name: Bug report
description: Report a reproducible WeJoy problem
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include role, order state, and commands without personal data.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or image tag
